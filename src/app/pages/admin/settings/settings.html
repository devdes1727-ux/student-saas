<div class="p-6 space-y-6">
  <div>
    <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">System Settings</h1>
    <p class="text-xs text-slate-500 mt-1">Configure academy preferences, contact configurations, and portal branding.</p>
  </div>

  <div *ngIf="loading" class="text-center py-12 text-slate-500 font-medium animate-pulse">
    Loading configurations...
  </div>

  <ng-container *ngIf="!loading">
    <div class="max-w-3xl rounded-3xl border border-slate-200 bg-white p-6 sm:p-8 shadow-soft space-y-6">
      
      <!-- Primary Profile settings -->
      <div class="space-y-4">
        <h3 class="font-extrabold text-slate-900 text-sm border-b border-slate-100 pb-2">Academy Identity</h3>
        <div class="grid gap-4 sm:grid-cols-2">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500">Academy Name *</label>
            <input type="text" [(ngModel)]="settings.name" class="mt-1.5 block w-full rounded-2xl border border-slate-200 bg-slate-50/50 px-3.5 py-2.5 text-xs text-slate-900 focus:outline-none transition" />
          </div>
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500">Logo Image Link</label>
            <input type="text" [(ngModel)]="settings.logoUrl" class="mt-1.5 block w-full rounded-2xl border border-slate-200 bg-slate-50/50 px-3.5 py-2.5 text-xs text-slate-900 focus:outline-none transition" placeholder="e.g. assets/logo.png" />
          </div>
        </div>
      </div>

      <!-- Contact details settings -->
      <div class="space-y-4 pt-4 border-t border-slate-100">
        <h3 class="font-extrabold text-slate-900 text-sm border-b border-slate-100 pb-2">Contact Details</h3>
        <div class="grid gap-4 sm:grid-cols-2">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500">Telephone / Phone</label>
            <input type="text" [(ngModel)]="settings.phone" class="mt-1.5 block w-full rounded-2xl border border-slate-200 bg-slate-50/50 px-3.5 py-2.5 text-xs text-slate-900 focus:outline-none transition" />
          </div>
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500">WhatsApp Helpline Number</label>
            <input type="text" [(ngModel)]="settings.whatsAppNumber" class="mt-1.5 block w-full rounded-2xl border border-slate-200 bg-slate-50/50 px-3.5 py-2.5 text-xs text-slate-900 focus:outline-none transition" placeholder="e.g. +91 93457 23852" />
          </div>
        </div>
        <div>
          <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500">Physical Address</label>
          <textarea [(ngModel)]="settings.address" rows="3" class="mt-1.5 block w-full rounded-2xl border border-slate-200 bg-slate-50/50 px-3.5 py-2.5 text-xs text-slate-900 focus:outline-none transition" placeholder="Enter school street address..."></textarea>
        </div>
      </div>

      <!-- Preference settings -->
      <div class="space-y-4 pt-4 border-t border-slate-100">
        <h3 class="font-extrabold text-slate-900 text-sm border-b border-slate-100 pb-2">Preferences & Layout</h3>
        <div class="grid gap-4 sm:grid-cols-2">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500">Portal Theme Style</label>
            <select [(ngModel)]="settings.themeSettings" class="mt-1.5 block w-full rounded-2xl border border-slate-200 bg-slate-50/50 px-3.5 py-2.5 text-xs text-slate-900 focus:outline-none transition">
              <option value="light">Vanilla Light Mode</option>
              <option value="dark">Vibrant Charcoal Dark</option>
              <option value="system">Follow Operating System</option>
            </select>
          </div>
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500">Social Media URL JSON</label>
            <input type="text" [(ngModel)]="settings.socialMediaLinks" class="mt-1.5 block w-full rounded-2xl border border-slate-200 bg-slate-50/50 px-3.5 py-2.5 text-xs text-slate-900 focus:outline-none transition" placeholder="e.g. {'facebook': 'url', 'instagram': 'url'}" />
          </div>
        </div>
      </div>

      <div class="flex items-center justify-end gap-3 pt-6 border-t border-slate-100">
        <button (click)="loadSettings()" class="rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-600 font-bold px-5 py-2.5 transition text-xs">Reset changes</button>
        <button (click)="saveSettings()" class="rounded-xl bg-slate-900 hover:bg-slate-800 text-white font-bold px-5 py-2.5 transition text-xs shadow">Save Settings</button>
      </div>

    </div>
  </ng-container>
</div>
