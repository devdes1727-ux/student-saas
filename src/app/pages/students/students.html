<div class="header">
    <h1>Students</h1>

    <button class="add-btn" (click)="openModal()">
        + Add Student
    </button>
</div>

<table>
    <tr>
        <th>Name</th>
        <th>Course</th>
        <th>Batch</th>
        <th>Phone</th>
        <th>Parent Name</th>
        <th>Parent Phone</th>
    </tr>

    <tr *ngFor="let s of students" (click)="viewStudent(s.id)">
        <td>{{s.name}}</td>
        <td>{{s.course}}</td>
        <td>{{s.batch}}</td>
        <td>{{s.phone}}</td>
        <td>{{s.parentName}}</td>
        <td>{{s.parentPhone}}</td>
    </tr>
</table>

<!-- MODAL -->
<div class="modal" *ngIf="showModal">
    <div class="modal-box">
        <h2>Add Student</h2>

        <input [(ngModel)]="student.name" placeholder="Student Name" />
        <input [(ngModel)]="student.phone" placeholder="Phone" />

        <input [(ngModel)]="student.parentName" placeholder="Parent Name" />
        <input [(ngModel)]="student.parentPhone" placeholder="Parent Phone" />

        <input [(ngModel)]="student.course" placeholder="Course" />
        <input [(ngModel)]="student.batch" placeholder="Batch" />
        <div class="actions">
            <button (click)="addStudent()">Save</button>
            <button class="cancel" (click)="closeModal()">Cancel</button>
        </div>
    </div>
</div>
