<div class="login-container">

    <div class="login-card">

        <h2>Student SaaS</h2>
        <p>Institute Management System</p>

        <input
            type="email"
            placeholder="Email"
            [(ngModel)]="email">

        <input
            type="password"
            placeholder="Password"
            [(ngModel)]="password">

        <button
            (click)="login()"
            [disabled]="loading">

            {{ loading ? 'Signing In...' : 'Login' }}

        </button>

        <div
            *ngIf="errorMessage"
            class="error">

            {{ errorMessage }}

        </div>

    </div>

</div>
