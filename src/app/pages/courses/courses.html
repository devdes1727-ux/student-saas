<div class="courses-grid" *ngIf="!loading">

  <div class="course-card card-premium" *ngFor="let c of filtered">

    <div class="course-header">

      <div class="course-icon">
        📚
      </div>

      <span class="badge" [class.badge-success]="c.isActive" [class.badge-warning]="!c.isActive">
        {{ c.isActive ? 'Active' : 'Inactive' }}
      </span>

    </div>

    <h3 class="course-name">
      {{ c.name }}
    </h3>

    <p class="course-desc">
      {{ c.description || 'No description available' }}
    </p>

    <div class="course-meta">

      <div class="meta-item">
        💰 ₹{{ c.fee }}
      </div>

      <div class="meta-item">
        ⏱ {{ c.duration }}
      </div>

      <div class="meta-item">
        🎯 {{ c.level }}
      </div>

      <div class="meta-item">
        👥 {{ c.maxStudents }} Students
      </div>

      <div class="meta-item">
        🧒 {{ c.ageGroup }}
      </div>

    </div>

    <div class="course-actions">

      <button class="btn-secondary" style="flex:1" (click)="openEdit(c)">
        ✏ Edit
      </button>

      <button class="btn-icon danger" (click)="delete(c)">
        🗑
      </button>

    </div>

  </div>

</div>
