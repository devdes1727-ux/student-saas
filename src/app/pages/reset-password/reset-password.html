<div class="login-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-circle">🎨</div>
      <div class="auth-logo-text">
        <h1>ArtClass SaaS</h1>
        <span>Set New Password</span>
      </div>
    </div>

    <div class="auth-title">
      <h2>New Password</h2>
      <p>Choose a strong password for your account</p>
    </div>

    <form class="auth-form" (submit)="submit(); $event.preventDefault()">

      <div class="auth-input-group">
        <label for="password">New Password</label>
        <input id="password" type="password" placeholder="Min. 6 characters"
               [(ngModel)]="password" name="password" [disabled]="!!success">
      </div>

      <div class="auth-input-group">
        <label for="confirm">Confirm Password</label>
        <input id="confirm" type="password" placeholder="Repeat your password"
               [(ngModel)]="confirmPassword" name="confirmPassword" [disabled]="!!success">
      </div>

      <div class="auth-error" *ngIf="error">
        <i class="fa-solid fa-circle-xmark"></i> {{ error }}
      </div>

      <div class="auth-success" *ngIf="success">
        <i class="fa-solid fa-circle-check"></i> {{ success }}
      </div>

      <button type="submit" class="auth-btn" [disabled]="loading || !!success">
        <span class="spinner" *ngIf="loading"></span>
        <i class="fa-solid fa-lock" *ngIf="!loading"></i>
        {{ loading ? 'Resetting...' : 'Reset Password' }}
      </button>

    </form>

    <div class="auth-links">
      <a routerLink="/login">← Back to Sign In</a>
    </div>

  </div>
</div>
