<div class="login-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-circle">🎨</div>
      <div class="auth-logo-text">
        <h1>ArtClass SaaS</h1>
        <span>Password Recovery</span>
      </div>
    </div>

    <div class="auth-title">
      <h2>Reset Password</h2>
      <p>Enter your email and we'll send a reset link</p>
    </div>

    <form class="auth-form" (submit)="submit(); $event.preventDefault()">

      <div class="auth-input-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="your@email.com"
               [(ngModel)]="email" name="email" [disabled]="!!success">
      </div>

      <div class="auth-error" *ngIf="error">
        <i class="fa-solid fa-circle-xmark"></i> {{ error }}
      </div>

      <div class="auth-success" *ngIf="success">
        <i class="fa-solid fa-envelope-circle-check"></i> {{ success }}
      </div>

      <button type="submit" class="auth-btn" [disabled]="loading || !!success">
        <span class="spinner" *ngIf="loading"></span>
        <i class="fa-solid fa-paper-plane" *ngIf="!loading"></i>
        {{ loading ? 'Sending...' : 'Send Reset Link' }}
      </button>

    </form>

    <div class="auth-links">
      <a routerLink="/login">← Back to Sign In</a>
    </div>

  </div>
</div>
